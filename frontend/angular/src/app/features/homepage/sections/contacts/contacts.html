<section class="py-5 bg-light">
  <div class="container">
    <div class="text-center mb-5">
      <h2 class="h3 fw-bold">Contatti e Assistenza</h2>

      <p class="text-secondary mb-0">
        Per informazioni sul servizio o per ricevere supporto puoi contattare gli uffici comunali
        attraverso uno dei seguenti canali.
      </p>
    </div>

    <div class="row g-4 justify-content-center">
      <div class="col-md-6 col-lg-4" *ngFor="let contact of contacts">
        <it-card class="contact-card h-100">
          <div class="it-card-body text-center p-4">
            <div class="contact-icon mb-3">
              <it-icon [name]="contact.icon"></it-icon>
            </div>

            <h3 class="it-card-title mb-3">
              {{ contact.title }}
            </h3>

            <a class="text-decoration-none" [href]="contact.link">
              {{ contact.value }}
            </a>
          </div>
        </it-card>
      </div>
    </div>

    <div class="text-center mt-5">
      <a itButton="primary" routerLink="/new-report"> Invia una segnalazione </a>
    </div>
  </div>
</section>
