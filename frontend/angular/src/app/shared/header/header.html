<div class="bd-example">
  <it-header
    slimTitle="Ente di appartenenza"
    slimTitleLink="https://italia.github.io/design-angular-kit"
    loginStyle="none"
    [light]="light"
    [showSearch]="search"
    [sticky]="sticky"
  >
    <ng-container brand>
      <a href="#">
        <it-icon name="pa"></it-icon>
        <div class="it-brand-text">
          <div class="it-brand-title">Portale Segnalazioni</div>
          <div class="it-brand-tagline d-none d-md-block">
            Servizio civico digitale del cittadinio
          </div>
        </div>
      </a>
    </ng-container>

    <ng-container navItems>
      <it-navbar-item>
        <a
          class="nav-link"
          [routerLink]="['/']"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          <span>Home</span>
        </a>
      </it-navbar-item>

      <it-navbar-item>
        <a class="nav-link" [routerLink]="['/new-report']" routerLinkActive="active">
          <span>Nuova Segnalazione</span>
        </a>
      </it-navbar-item>

      <it-navbar-item>
        <a class="nav-link" [routerLink]="['/search']" routerLinkActive="active">
          <span>Consulta Segnalazione</span>
        </a>
      </it-navbar-item>

      <it-navbar-item class="ms-auto">
        @if (auth.isAuthenticated()) {
          <app-user-menu></app-user-menu>
        } @else {
          <button itButton="primary" size="sm" [routerLink]="['/login']">Accedi</button>
        }
      </it-navbar-item>
    </ng-container>
  </it-header>
</div>
